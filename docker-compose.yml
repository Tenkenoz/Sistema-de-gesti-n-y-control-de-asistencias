#Aqui falta el servicio del frontend, pero lo agregare despues, por ahora solo el backend y la base de datos
services:
  # Servicio de Base de Datos
  db:
    image: postgres:17-alpine #Version de postgress 17
    container_name: transcontrol_db
    restart: always
    environment:
      POSTGRES_USER: transuser
      POSTGRES_PASSWORD: nueva_password   # ← CAMBIADO para coincidir con .env
      POSTGRES_DB: transcontrol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transuser -d transcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Servicio del Backend (FastAPI)
  backend:
    build: ./Backend
    container_name: transcontrol_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    depends_on:
      db:
        condition: service_healthy   # ← Espera a que la DB esté lista

volumes:
  postgres_data: