<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransControl - Dashboard Transportista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
        .animate-fade-out-up { animation: fadeOutUp 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
        .hidden-view { display: none !important; }
        .modal { display: none; }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        .spinner { border: 2px solid #fff; border-top: 2px solid transparent; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.6s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex overflow-hidden">

    <!-- Toast -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 hidden">
        <div id="toast" class="rounded-lg p-4 shadow-lg flex items-center bg-green-50 text-green-800 border-l-4 border-green-500">
            <svg id="toast-icon-success" class="h-5 w-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <svg id="toast-icon-error" class="hidden h-5 w-5 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="toast-message" class="font-medium text-sm">Mensaje</span>
        </div>
    </div>

    <!-- MODAL: SUBIR DOCUMENTO INDIVIDUAL -->
    <div id="modal-upload" class="modal fixed inset-0 bg-black/60 items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-gray-800">Subir Documento</h3>
                <button onclick="closeModal('modal-upload')" class="text-gray-400 hover:text-gray-600"><svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form id="form-upload" class="p-6">
                <input type="hidden" id="upload-tipo">
                <p class="text-sm text-gray-600 mb-4">Subiendo: <strong id="upload-nombre"></strong></p>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Archivo PDF *</label>
                    <input type="file" id="upload-archivo" accept="application/pdf" required class="w-full text-sm border border-gray-300 rounded-lg p-2">
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeModal('modal-upload')" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-teal-600 rounded-lg hover:bg-teal-700">Subir</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="w-64 bg-teal-900 text-white flex flex-col shadow-xl z-10 flex-shrink-0">
        <div class="p-6 flex items-center border-b border-teal-800">
            <svg class="h-6 w-6 mr-3 text-teal-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
            <h1 class="text-xl font-bold tracking-tight">TransControl</h1>
        </div>
        <div class="p-4 border-b border-teal-800 bg-teal-950/30">
            <p class="text-xs font-semibold text-teal-400 uppercase tracking-wider mb-1">Conductor</p>
            <p id="perfil-nombre" class="font-medium text-white truncate">Cargando...</p>
            <p id="perfil-placa" class="text-sm text-teal-300 font-mono mt-0.5">...</p>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1">
            <button onclick="switchTab('documentos')" id="tab-btn-documentos" class="w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors bg-teal-800 text-white">
                <svg class="h-5 w-5 mr-3 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Mi Expediente
                <span id="badge-alert" class="ml-auto bg-red-500 w-2.5 h-2.5 rounded-full hidden"></span>
            </button>
            <button onclick="switchTab('viaje')" id="tab-btn-viaje" class="w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-teal-100 hover:bg-teal-800/50">
                <svg class="h-5 w-5 mr-3 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                Mi Viaje Actual
            </button>
        </nav>
        <div class="p-4 border-t border-teal-800">
            <button onclick="cerrarSesion()" class="w-full flex items-center px-3 py-2 rounded-lg text-sm font-medium text-teal-200 hover:text-white hover:bg-teal-800 transition-colors">
                <svg class="h-5 w-5 mr-3 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Cerrar Sesión
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 overflow-y-auto">
        
        <!-- VISTA: MI EXPEDIENTE -->
        <div id="view-documentos" class="animate-fade-in max-w-4xl mx-auto">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Mi Expediente Operativo</h2>
                <p class="text-sm text-gray-500 mt-1">Gestiona tu documentación obligatoria. Cada documento se revisa individualmente.</p>
            </div>

            <!-- BANNER DE ESTADO -->
            <div id="expediente-banner"></div>

            <!-- TARJETAS DE DOCUMENTOS -->
            <div id="documentos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6"></div>
        </div>

        <!-- VISTA: MI VIAJE ACTUAL -->
        <div id="view-viaje" class="hidden-view animate-fade-in max-w-4xl mx-auto">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Mi Viaje Actual</h2>
                <p class="text-sm text-gray-500">Detalles de tu asignación operativa y ruta de despacho.</p>
            </div>
            <div id="container-viaje"></div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script>
        const API = 'http://localhost:8000';
        const TOKEN = localStorage.getItem('access_token');
        const USER_NOMBRES = localStorage.getItem('user_nombres');
        const USER_ROL = localStorage.getItem('user_rol');

        if (!TOKEN || USER_ROL !== 'TRANSPORTISTA') {
            alert('Acceso no autorizado');
            window.location.href = '../index.html';
        }

        const headers = (json = true) => ({
            'Authorization': `Bearer ${TOKEN}`,
            ...(json ? { 'Content-Type': 'application/json' } : {})
        });

        let miTransportistaId = null;
        let miPerfil = { nombres: USER_NOMBRES || 'Transportista', placa: '...' };
        let misDocumentos = []; // Lista de documentos individuales
        let miViaje = null;

        const docsObligatorios = [
            { id: 'CEDULA', label: 'Cédula de Identidad', desc: 'Copia a color de ambos lados', icono: '🪪' },
            { id: 'LICENCIA_E', label: 'Licencia Tipo E', desc: 'Vigente y legible', icono: '🚛' },
            { id: 'MATRICULA', label: 'Matrícula del Vehículo', desc: 'Actualizada al año en curso', icono: '📋' },
            { id: 'SOAT', label: 'SOAT', desc: 'Seguro obligatorio vigente', icono: '🛡️' },
            { id: 'REVISION_TECNICA', label: 'Revisión Técnica', desc: 'Aprobado anual', icono: '🔧' },
            { id: 'PERMISO_PESOS', label: 'Permiso de Pesos', desc: 'Otorgado por el MTOP', icono: '⚖️' }
        ];

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('perfil-nombre').textContent = USER_NOMBRES || 'Transportista';
            await cargarDatosTransportista();
            await cargarDocumentos();
            await cargarViaje();
        });

        // --- CARGAR DATOS ---
        async function cargarDatosTransportista() {
            try {
                const resp = await fetch(`${API}/api/auth/me`, { headers: headers() });
                const userData = await resp.json();
                const respTransp = await fetch(`${API}/api/transportistas/?solo_activos=true`, { headers: headers() });
                const transportistas = await respTransp.json();
                const miTransp = transportistas.find(t => t.usuario_id === userData.id);
                if (miTransp) {
                    miTransportistaId = miTransp.id;
                    miPerfil.placa = miTransp.placa_vehiculo || 'Sin placa';
                    document.getElementById('perfil-placa').textContent = miPerfil.placa;
                }
            } catch (e) { console.error(e); }
        }

        async function cargarDocumentos() {
            if (!miTransportistaId) { setTimeout(cargarDocumentos, 1000); return; }
            try {
                const resp = await fetch(`${API}/api/transportistas/${miTransportistaId}/documentos`, { headers: headers() });
                const data = await resp.json();
                misDocumentos = data.documentos || [];
                renderDocumentos();
            } catch (e) { console.error(e); }
        }

        async function cargarViaje() {
            if (!miTransportistaId) return;
            try {
                const resp = await fetch(`${API}/api/viajes/?transportista_id=${miTransportistaId}`, { headers: headers() });
                const viajes = await resp.json();
                miViaje = viajes.find(v => v.estado === 'TRANSPORTISTA_ASIGNADO' || v.estado === 'EN_EJECUCION') || null;
                renderViaje();
            } catch (e) { console.error(e); }
        }

        // --- TOAST ---
        let toastTimeout;
        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            t.className = type === 'error'
                ? 'rounded-lg p-4 shadow-lg flex items-center bg-red-50 text-red-800 border-l-4 border-red-500'
                : 'rounded-lg p-4 shadow-lg flex items-center bg-green-50 text-green-800 border-l-4 border-green-500';
            document.getElementById('toast-icon-success').classList.toggle('hidden', type === 'error');
            document.getElementById('toast-icon-error').classList.toggle('hidden', type !== 'error');
            c.classList.remove('hidden', 'animate-fade-out-up');
            c.classList.add('animate-fade-in-down');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                c.classList.remove('animate-fade-in-down');
                c.classList.add('animate-fade-out-up');
                setTimeout(() => c.classList.add('hidden'), 300);
            }, 4000);
        }

        function cerrarSesion() { localStorage.clear(); window.location.href = '../index.html'; }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function switchTab(tabId) {
            document.getElementById('view-documentos').classList.add('hidden-view');
            document.getElementById('view-viaje').classList.add('hidden-view');
            document.getElementById('tab-btn-documentos').className = "w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-teal-100 hover:bg-teal-800/50";
            document.getElementById('tab-btn-viaje').className = "w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-teal-100 hover:bg-teal-800/50";
            document.getElementById(`view-${tabId}`).classList.remove('hidden-view');
            document.getElementById(`tab-btn-${tabId}`).className = "w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors bg-teal-800 text-white";
        }

        // --- RENDERIZAR DOCUMENTOS INDIVIDUALES ---
        function renderDocumentos() {
            const banner = document.getElementById('expediente-banner');
            const grid = document.getElementById('documentos-grid');
            const badge = document.getElementById('badge-alert');

            // Contar estados
            const totalDocs = docsObligatorios.length;
            const aprobados = docsObligatorios.filter(d => misDocumentos.find(md => md.tipo === d.id && md.estado === 'APROBADO')).length;
            const rechazados = docsObligatorios.filter(d => misDocumentos.find(md => md.tipo === d.id && md.estado === 'RECHAZADO')).length;
            const pendientes = docsObligatorios.filter(d => misDocumentos.find(md => md.tipo === d.id && md.estado === 'PENDIENTE')).length;

            // Badge de alerta
            const hayProblemas = rechazados > 0 || (aprobados < totalDocs && pendientes === 0);
            badge.classList.toggle('hidden', !hayProblemas);

            // Banner
            if (aprobados === totalDocs) {
                banner.className = "bg-green-50 border border-green-200 rounded-xl p-4 flex items-center shadow-sm mb-4";
                banner.innerHTML = `<div class="bg-green-100 p-2 rounded-full mr-3 text-green-600">✅</div><div><h3 class="font-bold text-green-800">¡Expediente Completo!</h3><p class="text-sm text-green-700">Todos tus documentos están aprobados. Puedes recibir viajes.</p></div>`;
            } else if (rechazados > 0) {
                banner.className = "bg-red-50 border border-red-200 rounded-xl p-4 flex items-center shadow-sm mb-4";
                banner.innerHTML = `<div class="bg-red-100 p-2 rounded-full mr-3 text-red-600">⚠️</div><div><h3 class="font-bold text-red-800">Documentos Rechazados (${rechazados})</h3><p class="text-sm text-red-700">Corrige los documentos marcados en rojo y vuelve a subirlos.</p></div>`;
            } else if (pendientes > 0) {
                banner.className = "bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-center shadow-sm mb-4";
                banner.innerHTML = `<div class="bg-amber-100 p-2 rounded-full mr-3 text-amber-600">⏳</div><div><h3 class="font-bold text-amber-800">Documentos en Revisión (${pendientes})</h3><p class="text-sm text-amber-700">Secretaría está revisando tus documentos. Espera la confirmación.</p></div>`;
            } else {
                banner.className = "bg-blue-50 border border-blue-200 rounded-xl p-4 flex items-center shadow-sm mb-4";
                banner.innerHTML = `<div class="bg-blue-100 p-2 rounded-full mr-3 text-blue-600">📤</div><div><h3 class="font-bold text-blue-800">Sube tu documentación</h3><p class="text-sm text-blue-700">Debes subir los 6 documentos obligatorios para ser habilitado.</p></div>`;
            }

            // Grid de documentos
            grid.innerHTML = docsObligatorios.map(doc => {
                const docData = misDocumentos.find(md => md.tipo === doc.id);
                return renderCard(doc, docData);
            }).join('');
        }

        function renderCard(doc, docData) {
            let bg, border, badgeColor, badgeText, estadoIcono, acciones, motivoHTML = '';

            if (!docData) {
                // FALTANTE
                bg = 'bg-gray-50'; border = 'border-gray-300';
                badgeColor = 'bg-gray-200 text-gray-600'; badgeText = 'Faltante';
                estadoIcono = '❌';
                acciones = `<button onclick="openModalUpload('${doc.id}', '${doc.label}')" class="w-full mt-3 px-3 py-2 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700 font-medium">📤 Subir</button>`;
            } else if (docData.estado === 'APROBADO') {
                bg = 'bg-green-50'; border = 'border-green-400';
                badgeColor = 'bg-green-200 text-green-800'; badgeText = '✅ Aprobado';
                estadoIcono = '✅';
                acciones = `<button onclick="openModalUpload('${doc.id}', '${doc.label}')" class="w-full mt-3 px-3 py-2 border border-gray-300 text-gray-600 rounded-lg text-sm hover:bg-gray-100">🔄 Reenviar</button>`;
            } else if (docData.estado === 'RECHAZADO') {
                bg = 'bg-red-50'; border = 'border-red-400';
                badgeColor = 'bg-red-200 text-red-800'; badgeText = '❌ Rechazado';
                estadoIcono = '❌';
                motivoHTML = `<div class="mt-2 p-2 bg-red-100 rounded text-xs text-red-700"><strong>Motivo:</strong> ${docData.observacion || 'Sin especificar'}</div>`;
                acciones = `<button onclick="openModalUpload('${doc.id}', '${doc.label}')" class="w-full mt-3 px-3 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700 font-medium">🔄 Corregir y Reenviar</button>`;
            } else {
                // PENDIENTE
                bg = 'bg-amber-50'; border = 'border-amber-300';
                badgeColor = 'bg-amber-200 text-amber-800'; badgeText = '⏳ Pendiente';
                estadoIcono = '⏳';
                acciones = `<button onclick="openModalUpload('${doc.id}', '${doc.label}')" class="w-full mt-3 px-3 py-2 border border-gray-300 text-gray-600 rounded-lg text-sm hover:bg-gray-100">🔄 Reenviar</button>`;
            }

            return `
            <div class="rounded-xl border-2 ${border} ${bg} p-4 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-2xl">${doc.icono}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full font-bold ${badgeColor}">${badgeText}</span>
                </div>
                <h3 class="font-bold text-gray-800 text-sm">${doc.label}</h3>
                <p class="text-xs text-gray-500 mt-1">${doc.desc}</p>
                ${motivoHTML}
                ${acciones}
            </div>`;
        }

        // --- MODAL SUBIR DOCUMENTO INDIVIDUAL ---
        function openModalUpload(tipo, nombre) {
            document.getElementById('upload-tipo').value = tipo;
            document.getElementById('upload-nombre').textContent = nombre;
            document.getElementById('form-upload').reset();
            document.getElementById('modal-upload').classList.add('active');
        }

        document.getElementById('form-upload').addEventListener('submit', async function(e) {
            e.preventDefault();
            const tipo = document.getElementById('upload-tipo').value;
            const archivoInput = document.getElementById('upload-archivo');
            const archivo = archivoInput.files[0];

            if (!archivo) return showToast('Selecciona un archivo PDF', 'error');

            const formData = new FormData();
            formData.append('tipo', tipo);
            formData.append('archivo', archivo);

            try {
                const resp = await fetch(`${API}/api/transportistas/${miTransportistaId}/documentos`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN}` },
                    body: formData
                });
                if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail); }
                showToast('Documento subido correctamente');
                closeModal('modal-upload');
                await cargarDocumentos();
            } catch (err) { showToast(err.message, 'error'); }
        });

        // --- RENDERIZAR VIAJE ---
        function renderViaje() {
            const container = document.getElementById('container-viaje');
            const totalDocs = docsObligatorios.length;
            const aprobados = docsObligatorios.filter(d => misDocumentos.find(md => md.tipo === d.id && md.estado === 'APROBADO')).length;

            if (aprobados < totalDocs) {
                container.innerHTML = `
                    <div class="bg-white rounded-xl border border-dashed border-red-300 p-12 text-center text-red-500 shadow-sm">
                        <svg class="h-12 w-12 mx-auto mb-3 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p class="text-lg font-bold">Documentación Incompleta</p>
                        <p class="text-sm mt-1 text-gray-500">Necesitas ${totalDocs} documentos aprobados. Tienes ${aprobados}.</p>
                        <button onclick="switchTab('documentos')" class="mt-4 text-teal-600 font-medium hover:underline">Ir a mi expediente</button>
                    </div>`;
                return;
            }

            if (!miViaje) {
                container.innerHTML = `
                    <div class="bg-white rounded-xl border border-dashed border-gray-300 p-12 text-center text-gray-500 shadow-sm">
                        <p class="text-lg font-medium">No tienes viajes asignados.</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div class="bg-slate-800 text-white p-5 flex justify-between items-center">
                        <div><p class="text-slate-300 text-xs font-bold uppercase">Orden de Viaje</p><h3 class="text-2xl font-bold">${miViaje.codigo}</h3></div>
                        <span class="inline-block bg-teal-500 text-white text-xs px-3 py-1.5 rounded-full font-bold uppercase">${miViaje.estado.replace('_',' ')}</span>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <h4 class="text-sm font-bold text-gray-400 uppercase mb-4">Ruta</h4>
                                <div class="relative pl-6 space-y-6">
                                    <div class="absolute top-2 left-2.5 w-0.5 h-[calc(100%-2rem)] bg-gray-200"></div>
                                    <div class="relative"><div class="absolute -left-6 top-0.5 bg-white p-1 rounded-full border-2 border-blue-500"><div class="w-2 h-2 bg-blue-500 rounded-full"></div></div><p class="text-xs text-gray-500 uppercase">Origen</p><p class="font-medium">${miViaje.origen}</p></div>
                                    <div class="relative"><div class="absolute -left-6 top-0.5 bg-white p-1 rounded-full border-2 border-teal-500"><div class="w-2 h-2 bg-teal-500 rounded-full"></div></div><p class="text-xs text-gray-500 uppercase">Destino</p><p class="font-medium">${miViaje.destino}</p></div>
                                </div>
                            </div>
                            <div>
                                <h4 class="text-sm font-bold text-gray-400 uppercase mb-4">Carga</h4>
                                <div class="bg-gray-50 p-4 rounded-lg space-y-3">
                                    <div class="flex justify-between"><span class="text-xs text-gray-500 uppercase">Mercancía</span><span class="font-medium">${miViaje.tipo_mercancia}</span></div>
                                    <div class="flex justify-between"><span class="text-xs text-gray-500 uppercase">Peso</span><span class="font-medium">${parseFloat(miViaje.peso_total_kg).toLocaleString('es-ES')} kg</span></div>
                                    ${miViaje.destinatario_nombre ? `<div class="flex justify-between border-t pt-2"><span class="text-xs text-gray-500 uppercase">Destinatario</span><span class="font-medium">${miViaje.destinatario_nombre}</span></div>` : ''}
                                </div>
                            </div>
                        </div>
                        ${miViaje.observaciones ? `<div class="mt-6 bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm text-amber-800"><strong>Instrucciones:</strong> ${miViaje.observaciones}</div>` : ''}
                    </div>
                </div>`;
        }
    </script>
</body>
